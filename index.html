<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #333;
    }

    #status {
      font-size: 20px;
      margin: 15px 0;
      color: #444;
    }

    #board {
      display: inline-grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      margin: 10px auto;
    }

    .cell {
      width: 100px;
      height: 100px;
      background-color: white;
      border: 2px solid #333;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    .cell:hover {
      background-color: #e0e0e0;
    }

    #scoreboard {
      margin: 20px 0;
      font-size: 18px;
      color: #333;
    }

    #restart-btn {
      padding: 10px 25px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #restart-btn:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="scoreboard">
    X Wins: <span id="score-x">0</span> &nbsp;|&nbsp;
    O Wins: <span id="score-o">0</span> &nbsp;|&nbsp;
    Draws: <span id="score-d">0</span>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board"></div>

  <br>
  <button id="restart-btn" onclick="restartGame()">Restart</button>

  <script>
    const board = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = "X";
    let gameOver = false;

    const scores = { X: 0, O: 0, D: 0 };

    const winCombos = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    function createBoard() {
      let boardDiv = document.getElementById("board");
      boardDiv.innerHTML = "";

      for (let i = 0; i < 9; i++) {
        let cell = document.createElement("button");
        cell.classList.add("cell");
        cell.setAttribute("id", "cell-" + i);
        cell.onclick = function() {
          let index = this.id.split("-")[1];
          handleClick(index);
        };
        boardDiv.appendChild(cell);
      }
    }

    function handleClick(index) {
      if (gameOver) return;
      if (board[index] != "") return;

      board[index] = currentPlayer;
      document.getElementById("cell-" + index).textContent = currentPlayer;

      let winner = checkWinner();

      if (winner) {
        document.getElementById("status").textContent = "Player " + winner + " wins!";
        scores[winner]++;
        updateScores();
        gameOver = true;
      } else if (board.every(function(cell) { return cell != ""; })) {
        document.getElementById("status").textContent = "It's a draw!";
        scores.D++;
        updateScores();
        gameOver = true;
      } else {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        document.getElementById("status").textContent = "Player " + currentPlayer + "'s turn";
      }
    }

    function checkWinner() {
      for (let i = 0; i < winCombos.length; i++) {
        let a = winCombos[i][0];
        let b = winCombos[i][1];
        let c = winCombos[i][2];

        if (board[a] != "" && board[a] === board[b] && board[b] === board[c]) {
          return board[a];
        }
      }
      return null;
    }

    function updateScores() {
      document.getElementById("score-x").textContent = scores.X;
      document.getElementById("score-o").textContent = scores.O;
      document.getElementById("score-d").textContent = scores.D;
    }

    function restartGame() {
      board = ["", "", "", "", "", "", "", "", ""];
      currentPlayer = "X";
      gameOver = false;
      document.getElementById("status").textContent = "Player X's turn";
      createBoard();
    }

    createBoard();
  </script>

</body>
</html>
